name: Daily Template Test

on:
  schedule:
    # 每天凌晨3点运行
    - cron: '0 3 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  test-templates:
    runs-on: ubuntu-latest
    name: Test All Templates
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run template tests
      env:
        HIDREAM_TOKEN: ${{ secrets.HIDREAM_TOKEN }}
        STORAGE_AK: ${{ secrets.STORAGE_AK }}
        STORAGE_SK: ${{ secrets.STORAGE_SK }}
        TEST_IMAGE_UUID: ${{ secrets.TEST_IMAGE_UUID }}
      run: |
        # 运行批量测试
        python -c "
from tests.framework import TemplateTestRunner
import os

runner = TemplateTestRunner(
    image_uuid=os.getenv('TEST_IMAGE_UUID'),
    max_attempts=60
)

# 测试前20个未测试的模板
from scripts.config_manager import get_config_manager
config = get_config_manager()
untested = list(config.get_untested_ports().keys())[:20]

print(f'Testing {len(untested)} templates...')
results = runner.test_batch(untested)

# 保存报告
report_path = runner.save_report('test_reports/daily_template_test.json')
print(f'Report saved: {report_path}')

# 打印摘要
report = runner.generate_report()
summary = report['summary']
print(f\"\\nSummary: {summary['success']}/{summary['total']} passed\")
"
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: template-test-results
        path: test_reports/daily_template_test.json
    
    - name: Update test status
      if: always()
      run: |
        # 这里可以添加更新文档或发送通知的逻辑
        echo "Test completed. Check artifacts for results."
